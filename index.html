<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sprit-Buddy by Hasi-Labs</title>
    <style>
        /* --- PERLEFFEKT HINTERGRUND --- */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #2d0a1c, #4a0e2e, #880e4f, #fce4ec, #ffffff);
            background-size: 400% 400%;
            animation: pearlAnimation 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        @keyframes pearlAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STERNENREGEN --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="30" fill="rgba(255,255,255,0.4)" font-size="20">★</text><text x="60" y="80" fill="rgba(255,255,255,0.2)" font-size="14">★</text><text x="80" y="20" fill="rgba(255,255,255,0.3)" font-size="10">★</text></svg>');
            background-size: 150px 150px;
            animation: starRain 20s linear infinite;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes starRain {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* --- CONTAINER --- */
        .container { 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(12px); 
            padding: 30px; 
            border-radius: 40px; 
            box-shadow: 20px 20px 60px rgba(45, 10, 28, 0.3);
            text-align: center;
            width: 360px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: containerPop 0.6s ease-out;
        }

        @keyframes containerPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { color: #4a0e2e; font-size: 28px; margin-bottom: 20px; text-shadow: 1px 1px 0px white; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #4a0e2e; font-weight: bold; margin-bottom: 5px; margin-left: 10px; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #fce4ec; border-radius: 15px;
            font-size: 15px; box-sizing: border-box; background: white;
            transition: border 0.3s;
        }
        input:focus { border-color: #ad1457; outline: none; }

        button { 
            background: linear-gradient(135deg, #4a0e2e, #ad1457); color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(173, 20, 87, 0.4); }

        .route-btn { background: #4a0e2e; font-size: 12px; padding: 10px; margin-bottom: 15px; }

        .result-box { margin-top: 20px; padding: 15px; background: #fffafb; border-radius: 20px; border: 1px solid #fce4ec; min-height: 60px; }
        #ergebnis { font-size: 28px; font-weight: bold; color: #4a0e2e; }
        #proPerson { font-size: 15px; color: #ad1457; margin-top: 5px; font-weight: bold; }

        #loading { font-size: 11px; color: #ad1457; display: none; margin-bottom: 10px; font-style: italic; }

        /* --- FOOTER & KO-FI --- */
        .footer {
            margin-top: 25px;
            border-top: 1px dashed #fce4ec;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name { font-size: 14px; font-weight: bold; color: #4a0e2e; }

        .kofi-button {
            background-color: #29abe0;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .kofi-button:hover { background-color: #1a8bbd; transform: scale(1.05); }
        .kofi-button img { width: 14px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⛽ Sprit-Buddy</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Start</label><input type="text" id="start" placeholder="z.B. Berlin"></div>
        <div class="input-group"><label>Ziel</label><input type="text" id="ziel" placeholder="z.B. Hamburg"></div>
    </div>
    <div id="loading">Hasi rechnet... 🐰</div>
    <button class="route-btn" onclick="getDistance()">➔ Strecke suchen ✨</button>

    <div class="input-group"><label>Distanz (KM)</label><input type="number" id="km" placeholder="KM eingeben"></div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>L/100km</label><input type="number" id="verbrauch" value="7.5"></div>
        <div class="input-group"><label>Preis €/L</label><input type="number" id="preis" value="1.85"></div>
    </div>
    
    <div class="input-group"><label>Personen</label><input type="number" id="personen" value="1"></div>
    
    <button onclick="berechnen()" style="font-size: 18px;">ABKASSIEREN ✨</button>
    
    <div class="result-box">
        <div id="ergebnis">---</div>
        <div id="proPerson"></div>
    </div>

    <div class="footer">
        <span class="brand-name">Hasi-Labs ✨</span>
        <a href="https://ko-fi.com/hasilabs" target="_blank" class="kofi-button">
            <img src="https://storage.ko-fi.com/cdn/cup-border.png" alt="Ko-fi"> Spendieren
        </a>
    </div>
</div>

<script>
    async function getDistance() {
        const s = document.getElementById('start').value;
        const z = document.getElementById('ziel').value;
        if(!s || !z) return;
        document.getElementById('loading').style.display = "block";
        try {
            const r1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(s)}`);
            const j1 = await r1.json();
            const r2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(z)}`);
            const j2 = await r2.json();
            if(j1[0] && j2[0]) {
                const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${j1[0].lon},${j1[0].lat};${j2[0].lon},${j2[0].lat}?overview=false`);
                const rData = await route.json();
                document.getElementById('km').value = (rData.routes[0].distance / 1000).toFixed(1);
            }
        } catch(e) {}
        document.getElementById('loading').style.display = "none";
    }

    function berechnen() {
        let k = document.getElementById('km').value, v = document.getElementById('verbrauch').value, 
            p = document.getElementById('preis').value, n = document.getElementById('personen').value;
        if(k && v && p && n > 0) {
            let g = (k / 100) * v * p;
            document.getElementById('ergebnis').innerText = g.toFixed(2) + " €";
            document.getElementById('proPerson').innerText = "Anteil p.P.: " + (g/n).toFixed(2) + " €";
        }
    }
</script>
</body>
</html>
