<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprit-Buddy by Hasi-Labs</title>
    <style>
        /* --- PERLEFFEKT HINTERGRUND --- */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #2d0a1c, #4a0e2e, #880e4f, #fce4ec, #ffffff);
            background-size: 400% 400%;
            animation: pearlAnimation 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        @keyframes pearlAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- STERNENREGEN (JETZT WIEDER DA!) --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="30" fill="rgba(255,255,255,0.4)" font-size="20">★</text><text x="60" y="80" fill="rgba(255,255,255,0.2)" font-size="14">★</text><text x="80" y="20" fill="rgba(255,255,255,0.3)" font-size="10">★</text></svg>');
            background-size: 150px 150px;
            animation: starRain 20s linear infinite;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        @keyframes starRain {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* --- CONTAINER --- */
        .container { 
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(15px); 
            padding: 20px; 
            border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 95%;
            max-width: 350px; 
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 { color: #4a0e2e; font-size: 22px; margin-bottom: 15px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 11px; color: #4a0e2e; font-weight: bold; margin-bottom: 4px; margin-left: 5px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #fce4ec; 
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box; 
            background: white;
        }

        button { 
            background: linear-gradient(135deg, #4a0e2e, #ad1457); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 15px;
            margin-top: 5px;
        }

        .route-btn { background: #4a0e2e; font-size: 12px; padding: 10px; margin-bottom: 8px; }

        /* Blau für die Preissuche */
        .price-btn { 
            background: #29abe0; 
            font-size: 11px; 
            padding: 8px; 
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .result-box { margin-top: 15px; padding: 12px; background: rgba(255, 250, 251, 0.8); border-radius: 15px; border: 1px solid #fce4ec; }
        #ergebnis { font-size: 26px; font-weight: bold; color: #4a0e2e; }
        #proPerson { font-size: 14px; color: #ad1457; margin-top: 3px; font-weight: bold; }

        #loading { font-size: 11px; color: #ad1457; display: none; margin-bottom: 5px; font-style: italic; }

        .footer {
            margin-top: 15px;
            border-top: 1px dashed #fce4ec;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⛽ Sprit-Buddy</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="input-group"><label>Start</label><input type="text" id="start" placeholder="Berlin"></div>
        <div class="input-group"><label>Ziel</label><input type="text" id="ziel" placeholder="Hamburg"></div>
    </div>
    
    <div id="loading">Hasi rechnet... 🐰</div>
    <button class="route-btn" onclick="getDistance()">➔ Strecke suchen ✨</button>
    <button class="price-btn" onclick="checkLivePrices()">🔍 Günstigste Tanke finden</button>

    <div class="input-group"><label>Distanz (KM)</label><input type="number" id="km"></div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="input-group"><label>L/100km</label><input type="number" id="verbrauch" value="7.5" step="0.1"></div>
        <div class="input-group"><label>Preis €/L</label><input type="number" id="preis" value="1.85" step="0.01"></div>
    </div>
    
    <div class="input-group"><label>Personen</label><input type="number" id="personen" value="1"></div>
    
    <button onclick="berechnen()">ABKASSIEREN ✨</button>
    
    <div class="result-box">
        <div id="ergebnis">---</div>
        <div id="proPerson"></div>
    </div>

    <div class="footer">
        <span style="font-weight:bold; color:#4a0e2e; font-size: 12px;">Hasi-Labs ✨</span>
        <a href="https://ko-fi.com/hasilabs" target="_blank" style="text-decoration:none; color:#29abe0; font-size:11px; font-weight:bold;">Spendieren ☕</a>
    </div>
</div>

<script>
    function checkLivePrices() {
        const ort = document.getElementById('start').value;
        if(ort) {
            window.open(`https://www.clever-tanken.de/tankstelle_liste?ort=${encodeURIComponent(ort)}`, '_blank');
        } else {
            alert("🐰 Hasi braucht einen Startort!");
        }
    }

    async function getDistance() {
        const s = document.getElementById('start').value, z = document.getElementById('ziel').value;
        if(!s || !z) return;
        document.getElementById('loading').style.display = "block";
        try {
            const r1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(s)}`);
            const j1 = await r1.json();
            const r2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(z)}`);
            const j2 = await r2.json();
            if(j1[0] && j2[0]) {
                const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${j1[0].lon},${j1[0].lat};${j2[0].lon},${j2[0].lat}?overview=false`);
                const rData = await route.json();
                document.getElementById('km').value = (rData.routes[0].distance / 1000).toFixed(1);
            }
        } catch(e) {}
        document.getElementById('loading').style.display = "none";
    }

    function berechnen() {
        let k = document.getElementById('km').value, v = document.getElementById('verbrauch').value, 
            p = document.getElementById('preis').value, n = document.getElementById('personen').value;
        if(k && v && p && n > 0) {
            let g = (k / 100) * v * p;
            document.getElementById('ergebnis').innerText = g.toFixed(2) + " €";
            document.getElementById('proPerson').innerText = "Anteil p.P.: " + (g/n).toFixed(2) + " €";
        }
    }
</script>
</body>
</html>
