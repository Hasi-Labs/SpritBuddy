<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sprit-Buddy by Hasi-Labs</title>
    <style>
        /* --- PERLEFFEKT HINTERGRUND --- */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #2d0a1c, #4a0e2e, #880e4f, #fce4ec, #ffffff);
            background-size: 400% 400%;
            animation: pearlAnimation 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden; /* Wichtig: Keine Scrollbalken */
        }

        @keyframes pearlAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BEWEGTE STERNE (RIESELN) --- */
        body::before {
            content: "";
            position: absolute;
            top: -100%; /* Startet oberhalb des Bildschirms */
            left: 0; 
            width: 100%; 
            height: 200%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="30" fill="rgba(255,255,255,0.6)" font-size="20">★</text><text x="60" y="80" fill="rgba(255,255,255,0.3)" font-size="14">★</text><text x="80" y="20" fill="rgba(255,255,255,0.4)" font-size="10">★</text></svg>');
            background-size: 150px 150px;
            animation: starFall 25s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes starFall {
            from { transform: translateY(0); }
            to { transform: translateY(50%); }
        }

        /* --- KOMPAKTER CONTAINER --- */
        .container { 
            background: rgba(255, 255, 255, 0.75); /* Kristall-Look */
            backdrop-filter: blur(12px); 
            padding: 18px; 
            border-radius: 28px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
            width: 92%;
            max-width: 340px; 
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 { color: #4a0e2e; font-size: 22px; margin: 0 0 12px 0; }

        .input-group { margin-bottom: 8px; text-align: left; }
        label { display: block; font-size: 10px; color: #4a0e2e; font-weight: bold; margin-bottom: 3px; margin-left: 5px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid rgba(252, 228, 236, 0.6); 
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.9);
        }

        button { 
            background: linear-gradient(135deg, #4a0e2e, #ad1457); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 15px;
            margin-top: 8px;
        }

        .route-btn { background: #4a0e2e; font-size: 12px; padding: 10px; margin-bottom: 12px; margin-top: 2px;}

        /* --- TIPP BOX --- */
        .tipp-box {
            margin-top: 12px;
            padding: 10px;
            background: rgba(41, 171, 224, 0.12);
            border-radius: 12px;
            font-size: 11px;
            color: #0d47a1;
            text-align: left;
            line-height: 1.3;
        }

        /* --- ERGEBNIS BOX --- */
        .result-box { margin-top: 12px; padding: 12px; background: rgba(255, 250, 251, 0.65); border-radius: 18px; border: 1px solid #fce4ec; }
        #ergebnis { font-size: 26px; font-weight: bold; color: #4a0e2e; }
        #proPerson { font-size: 14px; color: #ad1457; font-weight: bold; margin-top: 2px; }

        #loading { font-size: 11px; color: #ad1457; display: none; margin-bottom: 5px; font-style: italic; }

        /* --- FOOTER --- */
        .footer {
            margin-top: 15px;
            border-top: 1px dashed rgba(173, 20, 87, 0.2);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kofi-link {
            text-decoration: none;
            color: #29abe0;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body onload="setSpritTipp()">

<div class="container">
    <h1>⛽ Sprit-Buddy</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="input-group"><label>Start</label><input type="text" id="start" placeholder="Ort"></div>
        <div class="input-group"><label>Ziel</label><input type="text" id="ziel" placeholder="Ort"></div>
    </div>
    
    <div id="loading">Hasi rechnet... 🐰</div>
    <button class="route-btn" onclick="getDistance()">➔ Strecke suchen ✨</button>

    <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px;">
        <div class="input-group"><label>KM</label><input type="number" id="km"></div>
        <div class="input-group"><label>L/100</label><input type="number" id="verbrauch" value="7.5" step="0.1"></div>
        <div class="input-group"><label>€/L</label><input type="number" id="preis" value="1.85" step="0.01"></div>
    </div>
    
    <div class="input-group"><label>Personen</label><input type="number" id="personen" value="1"></div>
    
    <button onclick="berechnen()">ABKASSIEREN ✨</button>

    <div class="tipp-box" id="spritTipp">💡 Lade Hasi-Tipp...</div>
    
    <div class="result-box">
        <div id="ergebnis">---</div>
        <div id="proPerson"></div>
    </div>

    <div class="footer">
        <span style="font-weight:bold; color:#4a0e2e; font-size: 11px;">Hasi-Labs ✨</span>
        <a href="https://ko-fi.com/hasilabs" target="_blank" class="kofi-link">Spendieren ☕</a>
    </div>
</div>

<script>
    function setSpritTipp() {
        const std = new Date().getHours();
        let tipp = "";
        if(std >= 18 && std <= 22) tipp = "💡 <b>Hasi-Tipp:</b> Jetzt tanken! Abends sind die Preise meist am niedrigsten.";
        else if(std >= 5 && std <= 10) tipp = "⚠️ <b>Hasi-Tipp:</b> Morgens ist es teuer. Warte lieber bis 18 Uhr!";
        else tipp = "💡 <b>Hasi-Tipp:</b> Preise sinken oft stetig bis ca. 21 Uhr.";
        document.getElementById('spritTipp').innerHTML = tipp;
    }

    async function getDistance() {
        const s = document.getElementById('start').value, z = document.getElementById('ziel').value;
        if(!s || !z) return;
        document.getElementById('loading').style.display = "block";
        try {
            const r1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(s)}`);
            const j1 = await r1.json();
            const r2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(z)}`);
            const j2 = await r2.json();
            if(j1[0] && j2[0]) {
                const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${j1[0].lon},${j1[0].lat};${j2[0].lon},${j2[0].lat}?overview=false`);
                const rData = await route.json();
                document.getElementById('km').value = (rData.routes[0].distance / 1000).toFixed(1);
            }
        } catch(e) {}
        document.getElementById('loading').style.display = "none";
    }

    function berechnen() {
        let k = document.getElementById('km').value, v = document.getElementById('verbrauch').value, 
            p = document.getElementById('preis').value, n = document.getElementById('personen').value;
        if(k && v && p && n > 0) {
            let g = (k / 100) * v * p;
            document.getElementById('ergebnis').innerText = g.toFixed(2) + " €";
            document.getElementById('proPerson').innerText = "p.P.: " + (g/n).toFixed(2) + " €";
        }
    }
</script>
</body>
</html>
